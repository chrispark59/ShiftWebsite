<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sponsors | Reality Shift</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=IBM+Plex+Mono:wght@300;400;500&display=swap" rel="stylesheet">
</head>
<body>
    <!-- Navigation -->
    <nav class="nav">
        <div class="nav-container">
            <a href="index.html" class="nav-logo">
                <img class="logo-icon" src="RS_ICON.svg" alt="Luma">
            </a>
            <div class="nav-links">
                <a href="sponsors.html" class="nav-link">Sponsors</a>
                <a href="prizes.html" class="nav-link">Prizes</a>
                <a href="faq.html" class="nav-link">FAQ</a>
            </div>
            <a href="https://luma.com/ttgl70ii" class="nav-cta">Apply now</a>
            <button class="mobile-menu-btn" aria-label="Menu">
                <span></span>
                <span></span>
                <span></span>
            </button>
        </div>
    </nav>
    <div class="mobile-dropdown">
        <a href="sponsors.html" class="mobile-link">Sponsors</a>
        <a href="prizes.html" class="mobile-link">Prizes</a>
        <a href="faq.html" class="mobile-link">FAQ</a>
    </div>

    <!-- Sponsors Section -->
    <section class="sponsors-page">
        <div class="sponsors-container">
            <h1 class="section-title">Our <span class="accent">Sponsors</span></h1>
            <p class="sponsors-subtitle">Reality Shift is made possible by these amazing partners</p>

            <!-- Primary Sponsors -->
            <div class="sponsor-tier tier-primary">
                <p class="tier-label">Primary Sponsors</p>
                <div class="sponsors-grid">
                    <div class="sponsor-card">
                        <img src="components/SnapAR.png" alt="Snap AR">
                    </div>
                    <div class="sponsor-card">
                        <img src="components/griefLogo.svg" alt="Greif">
                    </div>
                    <div class="sponsor-card">
                        <img src="components/neely-center.png" alt="Neely Center">
                    </div>
                </div>
            </div>

            <!-- Secondary Sponsors -->
            <div class="sponsor-tier tier-secondary">
                <p class="tier-label">Secondary Sponsors</p>
                <div class="sponsors-grid">
                    <div class="sponsor-card">
                        <img src="components/AhmansonLab.png" alt="Ahmanson Lab">
                    </div>
                    <div class="sponsor-card">
                        <img src="components/Sony_logo.svg" alt="Sony">
                    </div>
                    <div class="sponsor-card">
                        <img src="components/gemini.png" alt="Gemini">
                    </div>
                </div>
            </div>

            <!-- Supported By -->
            <div class="sponsor-tier tier-supported">
                <p class="tier-label">Supported By</p>
                <div class="sponsors-grid">
                    <div class="sponsor-card">
                        <img src="components/cokeLogo.png" alt="Coca-Cola">
                    </div>
                    <div class="sponsor-card">
                        <img src="components/celsius.png" alt="Celsius" style="transform: scale(1.6);">
                    </div>
                    <div class="sponsor-card">
                        <img src="components/monster1.png" alt="Monster Energy" style="transform: scale(2.2);">
                    </div>
                </div>
            </div>
        </div>
    </section>

    <script src="script.js"></script>
</body>
</html>
